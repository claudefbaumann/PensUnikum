name: AI Agent (@agent Trigger)

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  models: read

jobs:
  agent:
    runs-on: ubuntu-latest
    if: >-
      contains(github.event.issue.body, '@agent') ||
      contains(github.event.comment.body, '@agent')
    steps:
      - uses: actions/checkout@v4

      - name: AI Analyse via GitHub Models
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title || '' }}
          ISSUE_BODY: ${{ github.event.issue.body || github.event.comment.body || '' }}
        run: |
          pip install openai -q
          python3 << 'PY'
          import openai, os

          agents_md = open('AGENTS.md').read()[:1500]
          req_md = open('docs/REQUIREMENTS.md').read()[:1500]
          arch_md = open('docs/ARCHITECTURE.md').read()[:1000]
          task = os.environ.get('ISSUE_TITLE','') + '\n' + os.environ.get('ISSUE_BODY','')

          client = openai.OpenAI(
            base_url='https://models.inference.ai.azure.com',
            api_key=os.environ['GITHUB_TOKEN']
          )
          r = client.chat.completions.create(
            model='gpt-4o-mini',
            messages=[{'role':'user','content':
              'Du bist Developer-Agent fuer PensUnikum.\n'
              'AGENTS.md:\n' + agents_md + '\n\n'
              'REQUIREMENTS.md:\n' + req_md + '\n\n'
              'ARCHITECTURE.md:\n' + arch_md + '\n\n'
              'AUFGABE: ' + task[:2000] + '\n\n'
              'Antworte: 1. Was implementieren? 2. Betroffene Funktionen app.html? '
              '3. Implementierungsplan (4-6 Schritte) 4. Technischer Ansatz mit Begruendung 5. Tests?\n'
              'Max 500 Woerter, Deutsch, Markdown.'
            }],
            max_tokens=700
          )
          open('/tmp/analysis.md','w').write(r.choices[0].message.content)
          print(r.choices[0].message.content)
          PY

      - name: Als Kommentar posten
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const analysis = fs.readFileSync('/tmp/analysis.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## AI Agent Analyse\n\n' + analysis + '\n\n---\n*GitHub Models (GPT-4o-mini) - kostenlos*'
            });
